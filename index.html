<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0e7c66" />
    <meta name="description" content="Editable polygon, pincode, city, and locality coverage map." />
    <title>Editable Service Area Map</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/app-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="panel" aria-label="Map tools">
        <header class="brand-block">
          <p class="eyebrow">Coverage planner</p>
          <h1>Editable map</h1>
          <button id="installApp" class="install-button" type="button" hidden>Install app</button>
        </header>

        <section class="tool-section">
          <label class="field-label" for="searchInput">Search pincodes, locality, town, or district</label>
          <div class="search-row">
            <input id="searchInput" type="search" autocomplete="off" placeholder="Try 560001, 560034 or Bandra, Jaipur" />
            <button id="searchButton" type="button">Search</button>
          </div>
          <div id="searchResults" class="result-list" aria-live="polite"></div>
        </section>

        <section class="tool-section">
          <div class="section-title">
            <h2>Polygon editor</h2>
            <span id="drawStatus">Idle</span>
          </div>
          <div class="polygon-save-row">
            <input id="polygonName" placeholder="Polygon name" />
          </div>
          <div id="savedPolygons" class="saved-list" aria-live="polite"></div>
        </section>

        <section class="tool-section">
          <div class="section-title">
            <h2>Manage markers</h2>
            <span id="markerStatus">No marker</span>
          </div>
          <div class="pin-form">
            <input id="pinPincode" inputmode="numeric" maxlength="6" placeholder="Pincode" />
            <input id="pinCity" placeholder="Town / City" />
            <input id="pinDistrict" placeholder="District" />
            <input id="pinLocality" placeholder="Locality" />
            <button id="addPinMode" type="button">Place pin on map</button>
          </div>
          <div class="button-grid marker-actions">
            <button id="saveMarker" type="button" disabled>Save marker</button>
            <button id="removeMarker" type="button" disabled>Remove marker</button>
          </div>
        </section>

        <section class="tool-section">
          <div class="section-title">
            <h2>Import locations</h2>
          </div>
          <textarea id="importInput" placeholder="pincode,town/city,district,locality,lat,lng"></textarea>
          <div class="button-grid single-action">
            <button id="importLocations" type="button">Import rows</button>
          </div>
          <p id="importStatus" class="status-line" aria-live="polite"></p>
        </section>

        <section class="tool-section">
          <div class="section-title">
            <h2>Map data</h2>
          </div>
          <div class="button-grid">
            <button id="exportGeojson" type="button">Export GeoJSON</button>
            <button id="clearPins" type="button">Clear pins</button>
          </div>
          <textarea id="geojsonOutput" readonly placeholder="Exported GeoJSON appears here"></textarea>
        </section>
      </aside>

      <section class="map-wrap">
        <div class="polygon-toolbar" aria-label="Polygon drawing tools">
          <button id="startPolygon" class="tool-button" type="button" title="Draw polygon" aria-label="Draw polygon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 6l6-3 8 5-2 10-9 3-5-7 2-8z" />
              <path d="M5 6l7 6 7-4M12 12l-4 9M12 12l5 6" />
            </svg>
          </button>
          <button id="finishPolygon" class="tool-button" type="button" title="Finish polygon" aria-label="Finish polygon" disabled>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 6L9 17l-5-5" />
            </svg>
          </button>
          <button id="savePolygon" class="tool-button" type="button" title="Save polygon" aria-label="Save polygon" disabled>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 4h12l2 2v14H5V4z" />
              <path d="M8 4v6h8V4M8 20v-6h8v6" />
            </svg>
          </button>
          <button id="cancelPolygon" class="tool-button" type="button" title="Cancel draw" aria-label="Cancel draw" disabled>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6 6l12 12M18 6L6 18" />
            </svg>
          </button>
          <button id="deletePolygon" class="tool-button danger-tool" type="button" title="Delete selected polygon" aria-label="Delete selected polygon" disabled>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 7h16M9 7V4h6v3M7 7l1 13h8l1-13" />
            </svg>
          </button>
        </div>
        <div id="map" aria-label="Editable searchable map"></div>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="app.js"></script>
  </body>
</html>
